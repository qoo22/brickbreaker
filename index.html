// ── Brick interactions ───────────────────────────
function hitBrick(brick) {
  if (!brick.alive) return;
  // 破壊不能ブロック (外枠) — 跳ね返るだけで壊れず、コンボもスコアも入らない
  if (brick.indestructible) {
    spawnParticles(brick.cx, brick.cy, 200, 2);
    playHit();
    return;
  }

  // ボス処理 — 別ロジック
  if (brick.isBoss) {
    hitBoss(brick);
    return;
  }

  // 初回ヒットでアイテムをドロップ — 多段HPブロックでもアイテムは初回で出る
  if (!brick.itemDropped) {
    if (brick.emoji) {
      drops.push({
        x: brick.cx, y: brick.cy,
        type: 'emoji', emoji: brick.emoji,
        rarity: brick.rarity, vy: 2.2, rot: 0,
        isSecret: !!brick.isSecretItem
      });
    }
    if (brick.multiball) {
      drops.push({
        x: brick.cx, y: brick.cy,
        type: 'multiball', emoji: '⚡', vy: 2.2, rot: 0
      });
    }
    if (brick.life) {
      drops.push({
        x: brick.cx, y: brick.cy,
        type: 'life', emoji: '❤️', vy: 2.2, rot: 0
      });
    }
    if (brick.expand) {
      drops.push({
        x: brick.cx, y: brick.cy,
        type: 'expand', emoji: '📏', vy: 2.2, rot: 0
      });
    }
    brick.itemDropped = true;
  }

  // HPを減らす
  brick.hp = (brick.hp || 1) - 1;

  comboCount++;
  comboBest = Math.max(comboBest, comboCount);
  comboTimer = 90;
  // combo bonus
  const bonus = Math.floor(Math.max(0, comboCount - 4) * 2);
  // 多段HPブロックは1ヒットあたりは少なめ、最後のヒット (壊れるとき) にボーナス
  const baseScore = (brick.hp <= 0) ? 10 : 4;
  score += baseScore + bonus;
  spawnParticles(brick.cx, brick.cy, brick.hue, 3 + Math.min(comboCount/8, 4));
  playHit();

  // combo banner milestones
  if (comboCount === 5)  showFloater(W/2, 130, '🔥 5 COMBO!',         '#60a5fa', 32);
  if (comboCount === 10) showFloater(W/2, 130, '💥 10 COMBO RAMPAGE!','#f472b6', 36);
  if (comboCount === 20) showFloater(W/2, 130, '⚡ 20 COMBO UNSTOP!', '#fbbf24', 40);
  if (comboCount === 35) showFloater(W/2, 130, '👑 35 COMBO LEGEND!', '#c084fc', 44);
  if (comboCount === 50) showFloater(W/2, 130, '🌈 50 COMBO GODLIKE!','#ff6b9d', 48);
  if (comboCount >= 8 && comboCount % 5 === 0) screenShake = Math.max(screenShake, 4);

  // HPが残っていれば壊れない (跳ね返るだけ)
  if (brick.hp > 0) {
    return;
  }

  // HPが0 — 完全に破壊
  brick.alive = false;
}

// ── ボスへの攻撃処理 ─────────────────────────────
function hitBoss(boss) {
  if (!boss.alive) return;
  boss.hp = Math.max(0, boss.hp - 1);
  boss.hitFlash = 6;

  // 初回ヒットでアイテム (rare/legendary 絵文字) をドロップ
  if (!boss.itemDropped) {
    const e = pickHighTierMainEmoji();
    drops.push({
      x: boss.cx, y: boss.cy,
      type: 'emoji', emoji: e,
      rarity: rarityOf(e), vy: 1.6, rot: 0
    });
    boss.itemDropped = true;
  }

  // コンボ・スコア (ボスは 1ヒットあたり多めに)
  comboCount++;
  comboBest = Math.max(comboBest, comboCount);
  comboTimer = 90;
  const bonus = Math.floor(Math.max(0, comboCount - 4) * 2);
  score += 2 + bonus;
  spawnParticles(boss.cx + (Math.random()-0.5)*boss.w*0.5,
                 boss.cy + (Math.random()-0.5)*boss.h*0.5,
                 (boss.visTier >= 4 ? 0 : (boss.visTier >= 3 ? 0 : 280)),
                 4);
  playHit();

  // HP マイルストーン (75%, 50%, 25%) — パワーアップアイテムを落とす
  const milestones = [0.75, 0.5, 0.25];
  const hpPct = boss.hp / boss.maxHp;
  for (let i = boss.milestonesHit; i < milestones.length; i++) {
    if (hpPct <= milestones[i]) {
      boss.milestonesHit = i + 1;
      const pick = Math.random();
      let dt;
      if (pick < 0.4) dt = 'multiball';
      else if (pick < 0.75) dt = 'expand';
      else dt = 'life';
      drops.push({
        x: boss.cx + (Math.random()-0.5) * boss.w * 0.4,
        y: boss.cy,
        type: dt,
        emoji: dt === 'multiball' ? '⚡' : dt === 'expand' ? '📏' : '❤️',
        vy: 1.8, rot: 0
      });
      showFloater(boss.cx, boss.cy - 30,
                  `${Math.round(milestones[i]*100)}% — POWER UP!`, '#fbbf24', 22);
      screenShake = Math.max(screenShake, 6);
      break;
    }
  }

  if (boss.hp <= 0) {
    defeatBoss(boss);
  }
}

// ── ボス撃破時の報酬 ─────────────────────────────
function defeatBoss(boss) {
  boss.alive = false;

  // 高得点 — HPに比例
  const reward = Math.max(500, boss.maxHp * 5);
  score += reward;

  // メインプールから rare/legendary を1つドロップ
  const mainE = pickHighTierMainEmoji();
  drops.push({
    x: boss.cx - 30, y: boss.cy,
    type: 'emoji', emoji: mainE,
    rarity: rarityOf(mainE), vy: 1.5, rot: 0
  });

  // シークレットエモジ — Phase 2 解放後は高確率 (85%) でドロップ
  if (phase2Active() && Math.random() < 0.85) {
    const se = pickSecretEmoji(true);
    drops.push({
      x: boss.cx + 30, y: boss.cy,
      type: 'emoji', emoji: se,
      rarity: rarityOf(se), vy: 1.4, rot: 0,
      isSecret: true
    });
  }

  // 祝福 — マルチボール3つ + ライフ1個
  for (let i = 0; i < 3; i++) {
    drops.push({
      x: boss.cx + (Math.random()-0.5)*60, y: boss.cy,
      type: 'multiball', emoji: '⚡', vy: 2, rot: 0
    });
  }
  drops.push({
    x: boss.cx, y: boss.cy,
    type: 'life', emoji: '❤️', vy: 1.8, rot: 0
  });

  // 演出
  showFloater(W/2, H/2 - 60, '👑 BOSS DEFEATED 👑', '#fbbf24', 56);
  showFloater(W/2, H/2 + 10, '+' + reward.toLocaleString() + ' POINTS!', '#ffffff', 32);
  screenShake = 30;
  for (let i = 0; i < 220; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 2 + Math.random() * 8;
    particles.push({
      x: boss.cx, y: boss.cy,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
      hue: Math.random() * 360, life: 1,
      size: 2 + Math.random() * 5
    });
  }
  playLegend();
  setTimeout(() => playLegend(), 500);
}

function catchDrop(drop) {
  if (drop.type === 'emoji') {
    const wasAlreadyPhase1 = isPhase1Complete();
    const wasAlreadyPhase2 = isPhase2Complete();
    const isNew = !collection[drop.emoji];
    const r = drop.rarity || rarityOf(drop.emoji);
    const isSecret = drop.isSecret || isSecretEmoji(drop.emoji);
    if (isNew) sessionNew.add(drop.emoji);
    collection[drop.emoji] = (collection[drop.emoji] || 0) + 1;
    saveCollection();

    if (isNew) {
      const reward = { common: 100, uncommon: 200, rare: 500, legendary: 2000 }[r] || 100;
      score += reward;
      const prefix = isSecret ? '🌌 SECRET GET' : ({ common: '✨ 新発見', uncommon: '💫 新発見', rare: '🌟 新発見・レア', legendary: '👑 LEGENDARY GET!' }[r]);
      const size = r === 'legendary' ? 38 : r === 'rare' ? 30 : 24;
      showFloater(drop.x, drop.y - 30, prefix + ' ' + drop.emoji, isSecret ? '#a78bfa' : RARITY_COLOR[r], size);
      if (r === 'legendary' || isSecret) {
        playLegend();
        screenShake = Math.max(screenShake, 20);
        for (let i = 0; i < 80; i++) {
          const a = Math.random() * Math.PI * 2;
          const sp = 2 + Math.random() * 6;
          particles.push({
            x: drop.x, y: drop.y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
            hue: isSecret ? 270 + Math.random()*40 : 40 + Math.random()*30,
            life: 1, size: 2 + Math.random()*4
          });
        }
      } else {
        playPower();
      }
    } else {
      const repeat = { common: 30, uncommon: 60, rare: 150, legendary: 500 }[r] || 30;
      score += repeat;
      showFloater(drop.x, drop.y - 30, '+ ' + drop.emoji + ' ×' + collection[drop.emoji], RARITY_COLOR[r], 22);
      playPower();
    }

    // Phase完成チェック (新規収集の時のみ)
    if (isNew) {
      if (!wasAlreadyPhase1 && isPhase1Complete()) {
        triggerPhaseCompletion('phase1');
      } else if (!wasAlreadyPhase2 && isPhase2Complete() && phase2Active()) {
        triggerPhaseCompletion('phase2');
      }
    }
  } else if (drop.type === 'multiball') {
    spawnMultiball();
    showFloater(drop.x, drop.y - 30, '⚡ マルチボール！', '#80f0ff', 28);
    playPower();
  } else if (drop.type === 'life') {
    if (lives < 9) {
      lives++;
      showFloater(drop.x, drop.y - 30, '❤️ ライフ +1!', '#ff5c8a', 30);
      // particles
      for (let i = 0; i < 30; i++) {
        const a = Math.random() * Math.PI * 2;
        particles.push({
          x: drop.x, y: drop.y,
          vx: Math.cos(a)*3, vy: Math.sin(a)*3,
          hue: 340, life: 1, size: 2 + Math.random()*2
        });
      }
      playLegend();
    } else {
      score += 1000;
      showFloater(drop.x, drop.y - 30, '❤️ MAX +1000', '#ff5c8a', 24);
      playPower();
    }
  } else if (drop.type === 'expand') {
    activatePaddleExpand();
    showFloater(drop.x, drop.y - 30, '📏 PADDLE EXPAND!', '#80f0ff', 28);
    playPower();
  }
}

// ── パドル拡張 ───────────────────────────────────
function activatePaddleExpand() {
  const dur = 8000;  // 8秒
  paddleExpandUntil = Date.now() + dur;
  paddle.w = paddle.baseW * 1.7;
  paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
}

// ── Phase完成のトリガー ─────────────────────────
function triggerPhaseCompletion(phase) {
  if (phase === 'phase1') {
    if (collection.__phase1Done) return;
    collection.__phase1Done = true;
    pendingCelebration = 'phase1';
    saveCollection();
    showFloater(W/2, H/2 - 50, '🎊 PHASE 1 COMPLETE! 🎊', '#fbbf24', 44);
    showFloater(W/2, H/2 + 0, 'シークレットミッション解放！', '#c084fc', 28);
    showFloater(W/2, H/2 + 40, '✨ レア絵文字のドロップが始まります ✨', '#ffffff', 18);
    score += 10000;
    screenShake = 40;
    for (let i = 0; i < 400; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 1 + Math.random() * 9;
      particles.push({
        x: W/2, y: H/2,
        vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
        hue: Math.random() * 360,
        life: 1, size: 2 + Math.random() * 5
      });
    }
    playLegend();
    setTimeout(() => playLegend(), 400);
    setTimeout(() => playLegend(), 800);
  } else if (phase === 'phase2') {
    if (collection.__phase2Done) return;
    collection.__phase2Done = true;
    pendingCelebration = 'phase2';
    saveCollection();
    showFloater(W/2, H/2 - 50, '🌟 SECRET MISSION CLEAR 🌟', '#a78bfa', 44);
    showFloater(W/2, H/2 + 10, '全エモジ完全制覇！', '#fbbf24', 30);
    score += 50000;
    screenShake = 50;
    for (let i = 0; i < 600; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 1 + Math.random() * 11;
      particles.push({
        x: W/2, y: H/2,
        vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
        hue: Math.random() * 360,
        life: 1, size: 2 + Math.random() * 6
      });
    }
    playLegend();
    setTimeout(() => playLegend(), 300);
    setTimeout(() => playLegend(), 600);
    setTimeout(() => playLegend(), 900);
  }
}

function spawnMultiball() {
  if (balls.length >= 1000) return; // 画面のボール上限
  const base = balls.find(b => !b.onPaddle) || balls[0];
  if (!base) return;
  for (let i = 0; i < 2; i++) {
    const angle = (-Math.PI / 2) + (Math.random() - 0.5) * Math.PI * 0.6;
    const speed = Math.hypot(base.dx, base.dy) || 6.5;
    balls.push({
      x: base.x, y: base.y,
      dx: Math.cos(angle) * speed,
      dy: Math.sin(angle) * speed,
      r: 8, onPaddle: false, trail: []
    });
  }
}

// ── Particles & floaters ─────────────────────────
function spawnParticles(x, y, hue, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1,
      hue: hue + (Math.random()*60 - 30),
      life: 1,
      size: 1.5 + Math.random()*2.5
    });
  }
}

function showFloater(x, y, text, color, size) {
  floaters.push({ x, y, text, color: color || '#fff', size: size || 22, life: 1 });
}

// ── Update ───────────────────────────────────────
function update() {
  // 発射フェーズ:
  //   フェーズA (aimingMode=false): パドルはマウス/指に追従 — 発射台位置を決める段階
  //   フェーズB (aimingMode=true) : パドル固定 — マウス/指で角度を狙う段階
  // ボールがパドル上に無い通常プレイ時もマウス追従。
  const anyBallOnPaddle = balls.some(b => b.onPaddle);
  if (!anyBallOnPaddle || !aimingMode) {
    paddle.x = mouseX - paddle.w/2;
    paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
  }

  for (const ball of balls) {
    if (ball.onPaddle) {
      ball.x = paddle.x + paddle.w/2;
      ball.y = paddle.y - ball.r - 2;
      continue;
    }

    const sp = Math.hypot(ball.dx, ball.dy);
    const maxSp = 9 + stage * 0.1;
    if (sp > maxSp) { ball.dx *= maxSp/sp; ball.dy *= maxSp/sp; }
    if (sp < 5) { const s = 5/Math.max(0.1, sp); ball.dx *= s; ball.dy *= s; }

    ball.trail.push({ x: ball.x, y: ball.y });
    if (ball.trail.length > 10) ball.trail.shift();

    ball.x += ball.dx; ball.y += ball.dy;

    // Paddle bounce
    if (ball.dy > 0 &&
        ball.y + ball.r >= paddle.y &&
        ball.y - ball.r <= paddle.y + paddle.h &&
        ball.x >= paddle.x - 2 && ball.x <= paddle.x + paddle.w + 2) {
      ball.y = paddle.y - ball.r - 0.1;
      const hit = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
      const angle = hit * (Math.PI / 3);
      const speed = Math.max(6, Math.hypot(ball.dx, ball.dy));
      ball.dx = Math.sin(angle) * speed;
      ball.dy = -Math.abs(Math.cos(angle) * speed);
      playHit();
    }

    // Brick collisions
    // 不滅ブロックは破壊されないので1フレームに複数処理可能 — コーナー進入時に
    // X/Y両軸をきちんと跳ね返すため break しない。壊れるブロックは1個だけ処理。
    let hitDestroyableThisFrame = false;
    for (const brick of bricks) {
      if (!brick.alive) continue;
      if (hitDestroyableThisFrame && !brick.indestructible) continue;
      if (ball.x + ball.r > brick.x && ball.x - ball.r < brick.x + brick.w &&
          ball.y + ball.r > brick.y && ball.y - ball.r < brick.y + brick.h) {

        if (brick.indestructible) {
          // 不滅の外枠ブロック — ボーダー位置から反射方向をハードコード
          if (brick.col === 0) {
            ball.x = brick.x + brick.w + ball.r + 0.01;
            ball.dx =  Math.abs(ball.dx);
          } else if (brick.col === COLS - 1) {
            ball.x = brick.x - ball.r - 0.01;
            ball.dx = -Math.abs(ball.dx);
          } else if (brick.row === 0) {
            ball.y = brick.y + brick.h + ball.r + 0.01;
            ball.dy =  Math.abs(ball.dy);
          } else {
            // 下端の不滅ブロック (入口以外)。ボールが下から(パドル側から)当たった
            // のか、内部の上から当たったのかで押し戻し方向が変わる
            if (ball.dy < 0) {
              // 上に動いている = パドル側 (下) から当たった → 下に跳ね返す
              ball.y = brick.y + brick.h + ball.r + 0.01;
              ball.dy =  Math.abs(ball.dy);
            } else {
              // 下に動いている = 迷路内部 (上) から当たった → 上に跳ね返す
              ball.y = brick.y - ball.r - 0.01;
              ball.dy = -Math.abs(ball.dy);
            }
          }
          // 不滅ブロックは continue (break しない) — 隣接の不滅ブロックも処理する
          continue;
        }

        // 壊れるブロック — 侵入深度で軸を、速度方向で押し出し向きを決める
        const penL = (ball.x + ball.r) - brick.x;
        const penR = (brick.x + brick.w) - (ball.x - ball.r);
        const penT = (ball.y + ball.r) - brick.y;
        const penB = (brick.y + brick.h) - (ball.y - ball.r);
        const xPen = Math.min(penL, penR);
        const yPen = Math.min(penT, penB);
        const xTime = xPen / Math.max(0.1, Math.abs(ball.dx));
        const yTime = yPen / Math.max(0.1, Math.abs(ball.dy));
        if (xTime <= yTime) {
          if (ball.dx > 0) {
            ball.x = brick.x - ball.r - 0.01;
            ball.dx = -Math.abs(ball.dx);
          } else if (ball.dx < 0) {
            ball.x = brick.x + brick.w + ball.r + 0.01;
            ball.dx =  Math.abs(ball.dx);
          } else {
            if (penL < penR) { ball.x = brick.x - ball.r - 0.01; ball.dx = -1; }
            else             { ball.x = brick.x + brick.w + ball.r + 0.01; ball.dx = 1; }
          }
        } else {
          if (ball.dy > 0) {
            ball.y = brick.y - ball.r - 0.01;
            ball.dy = -Math.abs(ball.dy);
          } else if (ball.dy < 0) {
            ball.y = brick.y + brick.h + ball.r + 0.01;
            ball.dy =  Math.abs(ball.dy);
          } else {
            if (penT < penB) { ball.y = brick.y - ball.r - 0.01; ball.dy = -1; }
            else             { ball.y = brick.y + brick.h + ball.r + 0.01; ball.dy = 1; }
          }
        }
        // 対称軌道のロック回避
        ball.dx += (Math.random() - 0.5) * 0.15;
        ball.dy += (Math.random() - 0.5) * 0.15;
        hitBrick(brick);
        hitDestroyableThisFrame = true;
        // 壊れるブロックは1フレーム1個だけ処理 (HPが残って跳ね返るだけの場合も同様)。
        // 残りの不滅ブロックも見るためにループは続ける (continue 条件で破壊不能のみ通すようにしてある)
      }
    }

    // 画面端での反射 — パドル下のエリアには不滅ブロックが無いので
    // ここで弾き返す。また、何らかの不具合でボールが不滅ブロックを
    // すり抜けてしまっても、ここが最終防壁として機能する。
    if (ball.x - ball.r < 0) {
      ball.x = ball.r + 0.01;
      ball.dx =  Math.abs(ball.dx);
    }
    if (ball.x + ball.r > W) {
      ball.x = W - ball.r - 0.01;
      ball.dx = -Math.abs(ball.dx);
    }
    if (ball.y - ball.r < 0) {
      ball.y = ball.r + 0.01;
      ball.dy =  Math.abs(ball.dy);
    }
    // 下方向は入口から落下するシナリオがあるので反射せず、画面下に出たら死亡
    if (ball.y - ball.r > H) ball.dead = true;
  }
  balls = balls.filter(b => !b.dead);
  if (balls.length === 0 && gameState === 'playing' && !stageClearing && levelTransitionTimer === 0) loseLife();

  // Drops
  for (const d of drops) {
    d.y += d.vy;
    d.rot = (d.rot || 0) + 0.05;
    if (d.y + 14 > paddle.y && d.y < paddle.y + paddle.h &&
        d.x > paddle.x - 8 && d.x < paddle.x + paddle.w + 8) {
      catchDrop(d); d.dead = true;
    }
    if (d.y > H + 30) d.dead = true;
  }
  drops = drops.filter(d => !d.dead);

  // Particles
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.13;
    p.life -= 0.018;
  }
  particles = particles.filter(p => p.life > 0);

  // Floaters
  for (const f of floaters) { f.life -= 0.014; f.y -= 0.7; }
  floaters = floaters.filter(f => f.life > 0);

  if (comboTimer > 0) comboTimer--;
  else if (comboCount > 0) comboCount = 0;

  if (screenShake > 0) screenShake -= 1;

  // パドル拡張効果の期限切れチェック
  if (paddleExpandUntil > 0 && Date.now() > paddleExpandUntil) {
    paddleExpandUntil = 0;
    paddle.w = paddle.baseW;
    paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
  }

  if (gameState === 'playing' && !stageClearing && bricks.every(b => !b.alive || b.indestructible)) stageClear();
  if (levelTransitionTimer > 0) levelTransitionTimer--;
}

// ── ボス描画 (絵文字ベース・複数タイプ) ────────
function drawBoss(b) {
  const t = Date.now() * 0.003;
  const flash = b.hitFlash > 0;
  if (b.hitFlash > 0) b.hitFlash--;
  const themeCol = b.themeColor || '#a78bfa';
  const auraHue  = (typeof b.auraHue === 'number') ? b.auraHue : 280;

  ctx.save();

  // ── 外側の大オーラ (tier 2+)
  if (b.aura) {
    const auraR = Math.max(b.w, b.h) * (0.7 + b.visTier * 0.08);
    const a1 = b.visTier === 5 ? 0.7 : (b.visTier === 4 ? 0.55 : (b.visTier === 3 ? 0.45 : 0.35));
    const auraGrad = ctx.createRadialGradient(b.cx, b.cy, 0, b.cx, b.cy, auraR);
    auraGrad.addColorStop(0,   `hsla(${auraHue}, 80%, 55%, ${a1})`);
    auraGrad.addColorStop(0.6, `hsla(${auraHue}, 85%, 50%, ${a1*0.4})`);
    auraGrad.addColorStop(1,   `hsla(${auraHue}, 80%, 50%, 0)`);
    ctx.fillStyle = auraGrad;
    ctx.beginPath();
    ctx.arc(b.cx, b.cy, auraR, 0, Math.PI*2);
    ctx.fill();
  }

  // ── 鼓動
  const pulse = 1 + Math.sin(t * 3) * 0.04;
  const pw = b.w * pulse;
  const ph = b.h * pulse;

  // ── パターン別の周辺装飾
  // 触手 (Kraken / Octopus)
  if (b.tentacles) {
    ctx.strokeStyle = themeCol;
    ctx.lineCap = 'round';
    const numTent = 6;
    for (let i = 0; i < numTent; i++) {
      const ang0 = (i / numTent) * Math.PI * 2 + t * 0.2;
      ctx.lineWidth = 6 + b.visTier * 1.5;
      ctx.shadowColor = themeCol;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      const segs = 5;
      for (let s = 0; s <= segs; s++) {
        const r = Math.min(pw, ph) * 0.4 + s * (15 + b.visTier * 2);
        const wob = Math.sin(t * 2 + i + s * 0.6) * 0.4;
        const x = b.cx + Math.cos(ang0 + wob) * r;
        const y = b.cy + Math.sin(ang0 + wob) * r;
        if (s === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  }

  // テックリング (Robot / Alien)
  if (b.techRings) {
    for (let i = 0; i < 3; i++) {
      ctx.strokeStyle = `hsla(${auraHue}, 80%, 60%, ${0.7 - i*0.18})`;
      ctx.lineWidth = 2 + (2 - i) * 0.5;
      ctx.shadowColor = themeCol;
      ctx.shadowBlur = 8;
      const rotateOff = t * (0.4 + i * 0.15) * (i%2 ? -1 : 1);
      const rr = Math.max(pw, ph) * (0.5 + i * 0.12);
      ctx.beginPath();
      // 4本のアーク (回転リング)
      for (let k = 0; k < 4; k++) {
        const a0 = rotateOff + k * Math.PI/2;
        const a1 = a0 + 0.6;
        ctx.arc(b.cx, b.cy, rr, a0, a1);
        ctx.stroke();
        ctx.beginPath();
      }
    }
    ctx.shadowBlur = 0;
  }

  // 棘 (Spikes / 高ティア)
  if (b.spikes) {
    ctx.fillStyle = themeCol;
    ctx.shadowColor = themeCol;
    ctx.shadowBlur = 10;
    const numSpikes = b.visTier === 5 ? 16 : (b.visTier === 4 ? 12 : (b.visTier >= 3 ? 10 : 8));
    for (let i = 0; i < numSpikes; i++) {
      const ang = (i / numSpikes) * Math.PI * 2 + t * 0.18;
      const baseR = Math.min(pw, ph) * 0.46;
      const spikeLen = 14 + b.visTier * 4 + Math.sin(t * 4 + i) * 3;
      const x1 = b.cx + Math.cos(ang - 0.09) * baseR;
      const y1 = b.cy + Math.sin(ang - 0.09) * baseR;
      const x2 = b.cx + Math.cos(ang) * (baseR + spikeLen);
      const y2 = b.cy + Math.sin(ang) * (baseR + spikeLen);
      const x3 = b.cx + Math.cos(ang + 0.09) * baseR;
      const y3 = b.cy + Math.sin(ang + 0.09) * baseR;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.lineTo(x3, y3);
      ctx.closePath();
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  // 骨パターン (Skull King) — 円周上に小さなドットや骨らしき装飾
  if (b.pattern === 'bones') {
    ctx.fillStyle = '#e5e7eb';
    ctx.shadowColor = themeCol;
    ctx.shadowBlur = 10;
    const r = Math.min(pw, ph) * 0.55;
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2 + t * 0.1;
      const x = b.cx + Math.cos(a) * r;
      const y = b.cy + Math.sin(a) * r;
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  // ピクセルパターン (Space Invader)
  if (b.pattern === 'pixel') {
    ctx.fillStyle = themeCol;
    ctx.shadowColor = themeCol;
    ctx.shadowBlur = 8;
    for (let i = 0; i < 24; i++) {
      const a = Math.random() * Math.PI * 2;
      const r = Math.min(pw, ph) * (0.55 + Math.random() * 0.25);
      const x = b.cx + Math.cos(a) * r;
      const y = b.cy + Math.sin(a) * r;
      ctx.fillRect(x - 2, y - 2, 4, 4);
    }
    ctx.shadowBlur = 0;
  }

  // 霧 (Phantom)
  if (b.pattern === 'fog') {
    for (let i = 0; i < 4; i++) {
      const fogR = Math.min(pw, ph) * (0.55 + i * 0.10);
      const a = 0.18 - i * 0.04;
      const grad = ctx.createRadialGradient(b.cx, b.cy + Math.sin(t + i) * 4, 0, b.cx, b.cy, fogR);
      grad.addColorStop(0, `rgba(255,255,255,${a})`);
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(b.cx, b.cy, fogR, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // ── 内側の発光ベース円 (絵文字の背景)
  ctx.save();
  if (flash) {
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 38;
  } else {
    ctx.shadowColor = themeCol;
    ctx.shadowBlur = 18 + b.visTier * 5;
    const innerGrad = ctx.createRadialGradient(b.cx, b.cy, 0, b.cx, b.cy, Math.min(pw, ph) * 0.5);
    innerGrad.addColorStop(0, `hsla(${auraHue}, 90%, 70%, 0.85)`);
    innerGrad.addColorStop(0.6, `hsla(${auraHue}, 80%, 50%, 0.55)`);
    innerGrad.addColorStop(1, `hsla(${auraHue}, 70%, 35%, 0.25)`);
    ctx.fillStyle = innerGrad;
  }
  ctx.beginPath();
  ctx.ellipse(b.cx, b.cy, pw * 0.42, ph * 0.46, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // 内側のリング (tier 3+)
  if (b.visTier >= 3) {
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(b.cx, b.cy, pw * 0.34, ph * 0.36, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // ── ボス絵文字本体
  const emojiSize = Math.min(b.w * 0.62, b.h * 0.85) * pulse;
  ctx.font = `${emojiSize}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (flash) {
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 26;
  } else {
    ctx.shadowColor = themeCol;
    ctx.shadowBlur = 16 + b.visTier * 3;
  }
  ctx.save();
  ctx.translate(b.cx, b.cy);
  ctx.rotate(Math.sin(t * 2) * 0.06);  // 微妙な揺れ
  // ティア5 (虹色) のときは色をシフトしない (絵文字は元々色付きなので)
  // フラッシュ時は明るく
  if (flash) ctx.globalAlpha = 0.85;
  ctx.fillText(b.bossEmoji || '👾', 0, 0);
  ctx.restore();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;

  // ── 炎パーティクル (Fire / 高ティア)
  if (b.fire && Math.random() < 0.45) {
    for (let i = 0; i < 3; i++) {
      const ang = Math.random() * Math.PI * 2;
      particles.push({
        x: b.cx + Math.cos(ang) * pw * 0.4,
        y: b.cy + Math.sin(ang) * ph * 0.4,
        vx: Math.cos(ang) * 1.2,
        vy: Math.sin(ang) * 1.2 - 1.8,
        hue: 20 + Math.random() * 35,
        life: 1, size: 2 + Math.random() * 3
      });
    }
  }

  // ── 王冠 (tier 5 のみ)
  if (b.visTier === 5) {
    ctx.fillStyle = '#fbbf24';
    ctx.shadowColor = '#fbbf24';
    ctx.shadowBlur = 22;
    const cx = b.cx, cy = b.y - 10;
    ctx.beginPath();
    ctx.moveTo(cx - 30, cy + 14);
    ctx.lineTo(cx - 30, cy);
    ctx.lineTo(cx - 17, cy + 6);
    ctx.lineTo(cx - 8, cy - 10);
    ctx.lineTo(cx, cy + 6);
    ctx.lineTo(cx + 8, cy - 10);
    ctx.lineTo(cx + 17, cy + 6);
    ctx.lineTo(cx + 30, cy);
    ctx.lineTo(cx + 30, cy + 14);
    ctx.closePath();
    ctx.fill();
    // 宝石3つ
    ctx.fillStyle = '#ef4444';
    ctx.beginPath(); ctx.arc(cx - 17, cy + 4, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3b82f6';
    ctx.beginPath(); ctx.arc(cx, cy + 4, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#10b981';
    ctx.beginPath(); ctx.arc(cx + 17, cy + 4, 2, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  // ── ボス名プレート (HPバーの上)
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 3;
  ctx.strokeStyle = 'rgba(0,0,0,0.85)';
  const namePlateY = b.y - 30;
  if (b.bossName) {
    ctx.strokeText(b.bossName, b.cx, namePlateY);
    ctx.fillStyle = themeCol;
    ctx.fillText(b.bossName, b.cx, namePlateY);
  }

  // ── HPバー (上部)
  const hpBarW = b.w * 0.92;
  const hpBarH = 9;
  const hpBarX = b.cx - hpBarW/2;
  const hpBarY = b.y - hpBarH - 6;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(hpBarX - 2, hpBarY - 2, hpBarW + 4, hpBarH + 4);
  const hpPct = b.hp / b.maxHp;
  const hpColor = hpPct > 0.5 ? '#10b981' : (hpPct > 0.25 ? '#fbbf24' : '#ef4444');
  ctx.fillStyle = hpColor;
  ctx.fillRect(hpBarX, hpBarY, hpBarW * hpPct, hpBarH);
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 1;
  ctx.strokeRect(hpBarX, hpBarY, hpBarW, hpBarH);

  // HP数値
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 3;
  ctx.strokeStyle = 'rgba(0,0,0,0.85)';
  const hpText = `HP ${Math.ceil(b.hp).toLocaleString()} / ${b.maxHp.toLocaleString()}`;
  ctx.strokeText(hpText, b.cx, hpBarY + hpBarH/2);
  ctx.fillStyle = '#ffffff';
  ctx.fillText(hpText, b.cx, hpBarY + hpBarH/2);

  ctx.restore();
}

// ── Draw ─────────────────────────────────────────
function draw() {
  ctx.save();

  if (screenShake > 0) {
    ctx.translate((Math.random()-0.5) * screenShake, (Math.random()-0.5) * screenShake);
  }

  ctx.fillStyle = '#08081a';
  ctx.fillRect(0, 0, W, H);

  // stars
  for (let i = 0; i < 40; i++) {
    const sx = (i * 137 + (Date.now() * 0.005)) % W;
    const sy = (i * 53) % H;
    ctx.fillStyle = 'rgba(255,255,255,' + (0.05 + (i%5)*0.02) + ')';
    ctx.fillRect(sx, sy, 1, 1);
  }

  // Bricks
  for (const b of bricks) {
    if (!b.alive) continue;

    // ボス — 専用描画
    if (b.isBoss) {
      drawBoss(b);
      continue;
    }

    // 破壊不能 (外枠) — 暗いメタル調
    if (b.indestructible) {
      const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
      grad.addColorStop(0, '#5a5a6e');
      grad.addColorStop(0.5, '#3a3a4a');
      grad.addColorStop(1, '#1a1a26');
      ctx.fillStyle = grad;
      roundRect(ctx, b.x, b.y, b.w, b.h, 1);
      ctx.fill();
      // ハイライト (上1px)
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillRect(b.x + 1, b.y + 1, b.w - 2, 1);
      // 下のシャドウライン
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(b.x + 1, b.y + b.h - 2, b.w - 2, 1);
      continue;
    }

    const baseSat = b.emoji ? 80 : (b.multiball ? 90 : 65);
    const baseLit = b.emoji ? 60 : (b.multiball ? 65 : 50);
    // 多段HPブロックは満タン時に少し暗い金属調、ダメージで明るく(壊れかけ表示)
    const isMulti = (b.maxHp || 1) > 1;
    const damaged = isMulti && b.hp < b.maxHp;
    let sat = baseSat;
    let lit = baseLit;
    if (isMulti && !damaged) {
      // 硬いブロック (満タン) — 暗めで分かりやすく
      sat = Math.max(20, baseSat - 30);
      lit = Math.max(30, baseLit - 15);
    } else if (damaged) {
      // ダメージ受けて1/2あるいは2/3 — 元の色に近づく
      sat = baseSat;
      lit = baseLit;
    }

    // legendary/rare emoji bricks have special pulsing border
    // 多段HPブロックには shadowBlur をかけない (タフステージで全ブロックに
    // 影をかけると Canvas のガウシアンブラーが大量発生して激重になるため、
    // 縁取りは下の strokeRect / 数字 / ドットで代替する)
    if (b.rarity === 'legendary') {
      ctx.shadowColor = '#fbbf24';
      ctx.shadowBlur = 14 + 6 * Math.sin(Date.now() * 0.008);
    } else if (b.rarity === 'rare') {
      ctx.shadowColor = '#c084fc';
      ctx.shadowBlur = 8;
    } else {
      ctx.shadowBlur = 0;
    }

    if (isMulti) {
      // 多段HPブロックは「単色塗り + 直角」で軽量描画
      // (タフステージでは毎フレーム数百〜千個描くので、グラデと角丸を省く)
      ctx.fillStyle = `hsl(${b.hue}, ${sat}%, ${lit}%)`;
      ctx.fillRect(b.x, b.y, b.w, b.h);
    } else {
      const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
      grad.addColorStop(0, `hsl(${b.hue}, ${sat}%, ${lit+10}%)`);
      grad.addColorStop(1, `hsl(${b.hue}, ${sat}%, ${lit-10}%)`);
      ctx.fillStyle = grad;
      roundRect(ctx, b.x, b.y, b.w, b.h, 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // top highlight (1px) — 多段HPブロックは shield 枠 / 数字で十分なので省略
    if (!isMulti) {
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(b.x + 1, b.y + 1, b.w - 2, 1);
    }

    // 多段HPブロック — ダメージ状態の表示
    if (isMulti) {
      // 高HP (8+) は赤い縁取り、中HP (4-7) はオレンジ、低HP (2-3) は白系
      const ringColor = b.maxHp >= 8 ? 'rgba(248, 113, 113, 0.85)'
                       : b.maxHp >= 4 ? 'rgba(251, 191, 36, 0.85)'
                       : 'rgba(255, 255, 255, 0.55)';

      if (!damaged) {
        // 硬いブロック (満タン) — シールド枠
        ctx.strokeStyle = ringColor;
        ctx.lineWidth = b.maxHp >= 8 ? 1.4 : 1.2;
        ctx.strokeRect(b.x + 1.2, b.y + 1.2, b.w - 2.4, b.h - 2.4);
      } else {
        // ダメージ済 — ひび (斜め線)
        ctx.strokeStyle = 'rgba(0,0,0,0.55)';
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(b.x + 2, b.y + b.h - 2);
        ctx.lineTo(b.x + b.w * 0.45, b.y + b.h * 0.45);
        ctx.lineTo(b.x + b.w * 0.55, b.y + b.h * 0.7);
        ctx.lineTo(b.x + b.w - 2, b.y + 2);
        ctx.stroke();
      }

      // 残HP表示 — 4HP以上は数字、3HP以下はドット
      if (b.maxHp <= 3) {
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        for (let k = 0; k < b.hp; k++) {
          ctx.fillRect(b.x + b.w - 2 - k * 2.2, b.y + b.h - 2.2, 1.4, 1.4);
        }
      } else {
        // 数字でHPを表示 (中央)
        const hpText = String(b.hp);
        const fontSize = b.hp >= 10 ? 7 : 9;
        ctx.font = `bold ${fontSize}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // 縁取り (読みやすさ)
        ctx.lineWidth = 2;
        ctx.strokeStyle = 'rgba(0,0,0,0.85)';
        ctx.strokeText(hpText, b.x + b.w/2, b.y + b.h/2 + 0.5);
        ctx.fillStyle = b.maxHp >= 8 ? '#fecaca' : (b.maxHp >= 4 ? '#fef3c7' : '#ffffff');
        ctx.fillText(hpText, b.x + b.w/2, b.y + b.h/2 + 0.5);
      }
    }

    // 小さなブロックなのでアイコンではなく中央のドットでマーキング
    if (b.emoji) {
      const dotColor = b.isSecretItem ? '#a78bfa' : (b.rarity ? RARITY_COLOR[b.rarity] : '#fff');
      ctx.fillStyle = dotColor;
      ctx.beginPath();
      ctx.arc(b.x + b.w/2, b.y + b.h/2, (b.rarity === 'legendary' || b.isSecretItem) ? 3 : 2.2, 0, Math.PI*2);
      ctx.fill();
      // legendary/シークレット/rareには白いハイライト
      if (b.isSecretItem || b.rarity === 'legendary' || b.rarity === 'rare') {
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.beginPath();
        ctx.arc(b.x + b.w/2 - 0.5, b.y + b.h/2 - 0.5, 0.8, 0, Math.PI*2);
        ctx.fill();
      }
    } else if (b.multiball) {
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      ctx.fillText('⚡', b.x + b.w/2, b.y + b.h/2 + 0.5);
    } else if (b.life) {
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#ff5c8a';
      ctx.fillText('❤', b.x + b.w/2, b.y + b.h/2 + 0.5);
    } else if (b.expand) {
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#80f0ff';
      ctx.fillText('📏', b.x + b.w/2, b.y + b.h/2 + 0.5);
    }
  }

  // Drops
  for (const d of drops) {
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate(Math.sin(d.rot)*0.3);
    ctx.font = '24px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (d.type === 'emoji' && d.isSecret) {
      ctx.shadowColor = '#a78bfa';
      ctx.shadowBlur = 22;
    } else if (d.type === 'emoji' && d.rarity) {
      ctx.shadowColor = RARITY_COLOR[d.rarity];
      ctx.shadowBlur = d.rarity === 'legendary' ? 22 : (d.rarity === 'rare' ? 15 : 8);
    } else if (d.type === 'multiball') {
      ctx.shadowColor = '#80f0ff';
      ctx.shadowBlur = 12;
    } else if (d.type === 'life') {
      ctx.shadowColor = '#ff5c8a';
      ctx.shadowBlur = 16;
    } else if (d.type === 'expand') {
      ctx.shadowColor = '#80f0ff';
      ctx.shadowBlur = 14;
    }
    ctx.fillText(d.emoji, 0, 0);
    ctx.restore();
  }

  // Ball trails
  for (const ball of balls) {
    for (let i = 0; i < ball.trail.length; i++) {
      const t = ball.trail[i];
      const a = (i / ball.trail.length) * 0.5;
      ctx.fillStyle = `rgba(255, 220, 100, ${a})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, ball.r * (i / ball.trail.length), 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Balls
  for (const ball of balls) {
    ctx.shadowColor = '#fbbf24';
    ctx.shadowBlur = 18;
    const grad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, ball.r);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(1, '#fbbf24');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Paddle
  ctx.shadowColor = '#c084fc';
  ctx.shadowBlur = 14;
  const pgrad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
  pgrad.addColorStop(0, '#ffffff');
  pgrad.addColorStop(0.5, '#c084fc');
  pgrad.addColorStop(1, '#7c3aed');
  ctx.fillStyle = pgrad;
  roundRect(ctx, paddle.x, paddle.y, paddle.w, paddle.h, 6);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Particles
  for (const p of particles) {
    ctx.fillStyle = `hsla(${p.hue}, 100%, 60%, ${p.life})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fill();
  }

  // Floaters
  for (const f of floaters) {
    ctx.fillStyle = f.color;
    ctx.globalAlpha = Math.min(1, f.life * 1.5);
    ctx.font = `bold ${f.size}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = f.color;
    ctx.shadowBlur = 14;
    ctx.fillText(f.text, f.x, f.y);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // パドル上のボールの発射角度をマウスで狙うための矢印
  // フェーズB(角度照準モード)の間だけ照準矢印を表示する。
  // フェーズA(位置決め中)はパドルがマウスに追従していて矢印が
  // 揺れて分かりにくいので非表示にする。
  for (const ball of balls) {
    if (!ball.onPaddle) continue;
    if (!aimingMode) continue;
    const ang = getAimAngle(ball);
    const sinA = Math.sin(ang);
    const dyToMaze = mazeBottomY - ball.y;  // 迷路下端までの垂直距離 (負)
    // 矢印は迷路下端Yに到達する長さに伸ばす (角度が浅いほど長くなる、最大900で打ち切り)
    let len;
    if (sinA < -0.01) {
      len = Math.min(900, dyToMaze / sinA);
    } else {
      len = 300;
    }
    const tx = ball.x + Math.cos(ang) * len;
    const ty = ball.y + Math.sin(ang) * len;
    ctx.save();
    // 点線本体
    ctx.strokeStyle = 'rgba(255, 220, 100, 0.85)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 6]);
    ctx.beginPath();
    ctx.moveTo(ball.x, ball.y);
    ctx.lineTo(tx, ty);
    ctx.stroke();
    // 矢印の先
    ctx.setLineDash([]);
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx + Math.cos(ang + Math.PI - 0.4) * 14, ty + Math.sin(ang + Math.PI - 0.4) * 14);
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx + Math.cos(ang + Math.PI + 0.4) * 14, ty + Math.sin(ang + Math.PI + 0.4) * 14);
    ctx.stroke();
    // 着地予測点 (迷路下端ライン上に) — 入口を狙いやすく
    ctx.fillStyle = 'rgba(255, 220, 100, 0.9)';
    ctx.beginPath();
    ctx.arc(tx, ty, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  if (balls.some(b => b.onPaddle)) {
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    if (!aimingMode) {
      // フェーズA: 発射台位置を決める (PCはマウスでホバー→1回目クリック、
      //           スマホは指で押したままドラッグ→離す)
      ctx.fillText('① 発射台の位置を決める  (PC: マウス→クリック  /  スマホ: 押したままドラッグ→離す)', W/2, H - 60);
    } else {
      // フェーズB: 角度を決めて発射
      ctx.fillText('② 発射方向を狙って発射  (PC: 2回目クリック  /  スマホ: 狙う方向にタップ)', W/2, H - 60);
    }
  }

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ── HUD ──────────────────────────────────────────
function updateHUD() {
  document.getElementById('hud-stage').textContent = stage;
  document.getElementById('hud-score').textContent = score.toLocaleString();
  document.getElementById('hud-lives').textContent = lives > 0 ? '❤️'.repeat(lives) : '—';
  document.getElementById('hud-combo').textContent = comboCount;
  const tag = document.getElementById('hud-stage-tag');
  if (isBossStageNow) {
    tag.style.display = 'inline';
    tag.textContent = '💀 BOSS';
    tag.style.color = '#ef4444';
    tag.style.textShadow = '0 0 8px rgba(239, 68, 68, 0.7)';
  } else if (isToughStage) {
    tag.style.display = 'inline';
    tag.textContent = '⚒️ TOUGH';
    tag.style.color = '#fbbf24';
    tag.style.textShadow = '0 0 8px rgba(251, 191, 36, 0.6)';
  } else {
    tag.style.display = 'none';
  }
}

// ── Main loop ────────────────────────────────────
function loop() {
  if (gameState !== 'playing') return;
  update();
  draw();
  updateHUD();
  requestAnimationFrame(loop);
}

// ── Title-screen collection rendering ────────────
function renderCollection() {
  const collectedCount = EMOJI_LIST.filter(x => collection[x.e]).length;
  const pct = TOTAL_EMOJIS === 0 ? 0 : Math.round((collectedCount / TOTAL_EMOJIS) * 100);
  document.getElementById('cs-collected').textContent = collectedCount;
  document.getElementById('cs-total').textContent = TOTAL_EMOJIS;
  document.getElementById('cs-pct').textContent = pct + '%';
  document.getElementById('cs-bar').style.width = pct + '%';

  const wrap = document.getElementById('cs-categories');
  wrap.innerHTML = '';

  // group by category
  const cats = {};
  EMOJI_LIST.forEach(x => {
    if (!cats[x.cat]) cats[x.cat] = [];
    cats[x.cat].push(x);
  });

  // sort within each category by rarity (rare last so they stand out)
  const order = ['common','uncommon','rare','legendary'];
  for (const cat in cats) cats[cat].sort((a,b) => order.indexOf(a.r) - order.indexOf(b.r));

  for (const cat of Object.keys(cats)) {
    const list = cats[cat];
    const got = list.filter(x => collection[x.e]).length;
    const heading = document.createElement('div');
    heading.className = 'category';
    const tally = list.reduce((a, x) => { a[x.r] = (a[x.r]||0) + (collection[x.e]?1:0); return a; }, {common:0, uncommon:0, rare:0, legendary:0});
    const totalsByR = list.reduce((a, x) => { a[x.r] = (a[x.r]||0) + 1; return a; }, {common:0, uncommon:0, rare:0, legendary:0});
    let breakdown = '';
    order.forEach(r => {
      if (totalsByR[r]) breakdown += `<span style="color:${RARITY_COLOR[r]};margin-left:8px;">${tally[r]}/${totalsByR[r]}</span>`;
    });
    heading.innerHTML = `<span>${cat}  ${got} / ${list.length}</span><span>${breakdown}</span>`;
    wrap.appendChild(heading);

    const grid = document.createElement('div');
    grid.className = 'collection-grid';
    list.forEach(x => {
      const cell = document.createElement('div');
      cell.className = 'emoji-cell r-' + x.r;
      cell.textContent = x.e;
      cell.title = `${x.e} ${RARITY_LABEL_JP[x.r]}` + (collection[x.e] ? ` ×${collection[x.e]}` : ' (未収集)');
      if (collection[x.e]) {
        cell.classList.add('collected');
        if (collection[x.e] > 1) {
          const cnt = document.createElement('span');
          cnt.className = 'count';
          cnt.textContent = '×' + collection[x.e];
          cell.appendChild(cnt);
        }
      }
      grid.appendChild(cell);
    });
    wrap.appendChild(grid);
  }

  // シークレットコレクション (Phase 2 解放後のみ表示)
  if (phase2Active()) {
    const secColl = SECRET_EMOJI_LIST.filter(x => collection[x.e]).length;
    const secSection = document.createElement('div');
    secSection.className = 'secret-section';
    secSection.innerHTML = `
      <div class="secret-header">🌌 SECRET MISSION 🌌</div>
      <div class="collection-stats" style="margin-bottom:6px;">
        <span class="big" style="font-size:14px;">レアコレクション <span style="color:#a78bfa;">${secColl}</span> / ${TOTAL_SECRET}</span>
        <span class="pct" style="font-size:18px;">${Math.round(secColl / TOTAL_SECRET * 100)}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${secColl / TOTAL_SECRET * 100}%; background: linear-gradient(90deg, #a78bfa, #fbbf24);"></div></div>
    `;

    const secGrid = document.createElement('div');
    secGrid.className = 'collection-grid';
    SECRET_EMOJI_LIST.forEach(x => {
      const cell = document.createElement('div');
      cell.className = 'emoji-cell r-secret r-' + x.r;
      cell.textContent = x.e;
      cell.title = `${x.e} シークレット ${RARITY_LABEL_JP[x.r]}` + (collection[x.e] ? ` ×${collection[x.e]}` : ' (未収集)');
      if (collection[x.e]) {
        cell.classList.add('collected');
        if (collection[x.e] > 1) {
          const cnt = document.createElement('span');
          cnt.className = 'count';
          cnt.textContent = '×' + collection[x.e];
          cell.appendChild(cnt);
        }
      }
      secGrid.appendChild(cell);
    });
    secSection.appendChild(secGrid);
    wrap.appendChild(secSection);

    // Phase 2 完成済みなら殿堂表示
    if (isPhase2Complete()) {
      const masterBadge = document.createElement('div');
      masterBadge.style.cssText = 'text-align:center; margin-top:12px; padding:10px; font-size:14px; font-weight:800; color:#fbbf24; background:linear-gradient(135deg, rgba(251,191,36,0.15), rgba(167,139,250,0.15)); border-radius:10px; border:1px solid rgba(251,191,36,0.5); letter-spacing:2px;';
      masterBadge.innerHTML = '👑 LEGENDARY MASTER 👑<br><span style="font-size:11px; font-weight:400; color:#fde68a;">全コレクションコンプリート達成</span>';
      wrap.appendChild(masterBadge);
    }
  } else {
    // Phase 1未完成 — シークレットミッションへの誘導
    const teaser = document.createElement('div');
    teaser.style.cssText = 'margin-top:14px; padding:10px 14px; text-align:center; background:rgba(167,139,250,0.06); border:1px dashed rgba(167,139,250,0.4); border-radius:10px; font-size:12px; color:#a0a0c0;';
    teaser.innerHTML = '🔒 全エモジを集めると <b style="color:#a78bfa;">シークレットミッション</b> が解放されます';
    wrap.appendChild(teaser);
  }
}

// ── Input ────────────────────────────────────────
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
  mouseY = (e.clientY - rect.top)  * (H / rect.height);
});
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  if (t) {
    mouseX = (t.clientX - rect.left) * (W / rect.width);
    mouseY = (t.clientY - rect.top)  * (H / rect.height);
  }
  // フェーズA(位置決め)中はドラッグでパドルを直接動かす
  // (update ループでも追従しているが、フレーム待ちが発生しないよう明示更新)
  if (!aimingMode && balls.some(b => b.onPaddle)) {
    paddle.x = Math.max(0, Math.min(W - paddle.w, mouseX - paddle.w/2));
  }
}, { passive: false });

// マウス位置からの発射角度を返す (上向き範囲にクランプ)
function getAimAngle(ball) {
  let dx = mouseX - ball.x;
  let dy = mouseY - ball.y;
  if (dy > -10) dy = -10;            // 必ず少し上向き
  let ang = Math.atan2(dy, dx);
  // 真左/真右になりすぎないようにクランプ (-170°〜-10°)
  return Math.max(-Math.PI + 0.18, Math.min(-0.18, ang));
}

function launchBalls() {
  ensureAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  for (const ball of balls) {
    if (ball.onPaddle) {
      ball.onPaddle = false;
      const ang = getAimAngle(ball);
      const speed = 7;
      ball.dx = Math.cos(ang) * speed;
      ball.dy = Math.sin(ang) * speed;
    }
  }
  aimingMode = false;
}

// マウス: 1回目クリックで発射台の位置を確定 (フェーズB へ)、
//        2回目クリックで発射。
// フェーズA中はマウス移動でパドルが追従、フェーズB中は照準矢印が
// マウス位置に追従する。
canvas.addEventListener('mousedown', (e) => {
  ensureAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (!balls.some(b => b.onPaddle)) return;
  if (!aimingMode) {
    // 1回目: 現在のパドル位置で確定し、角度照準モードへ
    aimingMode = true;
  } else {
    // 2回目: 発射
    launchBalls();
  }
});

// タッチデバイス:
//   フェーズA: 指を画面に置いて押したままドラッグ → 発射台が指に追従。
//             指を離した瞬間にパドル位置が確定し、角度照準モードへ移行。
//   フェーズB: もう一度タップ(or タッチドラッグして離す)→ そのタップ位置の
//             方向にボールを発射。
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  if (t) {
    mouseX = (t.clientX - rect.left) * (W / rect.width);
    mouseY = (t.clientY - rect.top)  * (H / rect.height);
  }
  // 音声コンテキストはユーザー操作で起動 (iOS/Androidで音を鳴らすのに必須)
  ensureAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  // フェーズA中: 指の現在位置にパドルを即スナップ (update ループ任せだと
  // 1フレーム遅れて重く感じることがあるので、ここでも明示的に追従)
  if (!aimingMode && balls.some(b => b.onPaddle)) {
    paddle.x = Math.max(0, Math.min(W - paddle.w, mouseX - paddle.w/2));
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  // 最後の指の位置を mouseX/Y に反映
  const t = e.changedTouches && e.changedTouches[0];
  if (t) {
    const rect = canvas.getBoundingClientRect();
    mouseX = (t.clientX - rect.left) * (W / rect.width);
    mouseY = (t.clientY - rect.top)  * (H / rect.height);
  }
  if (!balls.some(b => b.onPaddle)) return;
  if (!aimingMode) {
    // フェーズA終了: 指を離した位置に発射台を固定して角度照準モードへ
    paddle.x = Math.max(0, Math.min(W - paddle.w, mouseX - paddle.w/2));
    aimingMode = true;
  } else {
    // フェーズB: 指を離した位置(= 狙う方向)に発射
    launchBalls();
  }
}, { passive: false });

canvas.addEventListener('touchcancel', (e) => {
  e.preventDefault();
  // タッチが OS にキャンセルされた場合は安全側にフェーズリセット
  aimingMode = false;
}, { passive: false });
window.addEventListener('keydown', (e) => {
  if (gameState === 'playing' && (e.key === ' ' || e.code === 'Space')) {
    e.preventDefault();
    // スペースは即発射 (現在のパドル位置・現在のマウス位置で角度算出)
    launchBalls();
  }
});

document.getElementById('start-btn').addEventListener('click', () => {
  // 既存のセーブがある場合は確認
  const save = loadSavedGame();
  if (save && save.lives > 0) {
    if (!confirm(`新しくスタートすると現在のセーブ (ステージ${save.stage}・スコア${save.score.toLocaleString()}) は失われます。続けますか？`)) {
      return;
    }
    clearSavedGame();
  }
  startGame(false);
});
document.getElementById('continue-btn').addEventListener('click', () => startGame(true));
document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('コレクションをリセットしますか？')) {
    collection = {}; saveCollection(); renderCollection();
  }
});
document.getElementById('reset-save-btn').addEventListener('click', () => {
  if (confirm('セーブデータを破棄しますか？')) {
    clearSavedGame();
    refreshContinueButton();
  }
});
document.getElementById('go-retry').addEventListener('click', () => startGame(false));
document.getElementById('go-title-btn').addEventListener('click', backToTitle);
document.getElementById('cel-close').addEventListener('click', () => {
  hideCelebration();
  renderCollection();
});

// ── Init ─────────────────────────────────────────
renderCollection();
refreshContinueButton();
maybeShowCelebration();
</script>
