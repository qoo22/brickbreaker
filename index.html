<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>絵文字ブロック崩し ✨</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 20px;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background:
      radial-gradient(circle at 20% 10%, #2a1840 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, #1a3060 0%, transparent 40%),
      linear-gradient(135deg, #0a0a1a 0%, #14142a 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    user-select: none;
  }

  h1 {
    font-size: 44px;
    margin: 0 0 4px 0;
    background: linear-gradient(45deg, #ff6b9d 0%, #c084fc 50%, #60a5fa 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 40px rgba(192, 132, 252, 0.4);
    letter-spacing: 1px;
  }
  .subtitle { color: #a0a0c0; margin: 0 0 20px 0; font-size: 14px; }

  #title-screen, #game-screen, #gameover-screen { width: 100%; max-width: 720px; text-align: center; }
  #game-screen, #gameover-screen { display: none; }

  /* Collection panel */
  #collection-panel {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(192, 132, 252, 0.2);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 18px;
    margin: 16px 0 24px 0;
  }
  .collection-stats {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .collection-stats .big { font-size: 22px; font-weight: 700; }
  .collection-stats .pct {
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(45deg, #ff6b9d, #c084fc);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .progress-bar {
    height: 10px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #f472b6, #c084fc, #60a5fa);
    border-radius: 6px;
    transition: width 0.6s cubic-bezier(.2,.8,.2,1);
    box-shadow: 0 0 12px rgba(192, 132, 252, 0.6);
  }

  /* Rarity legend */
  .rarity-legend {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin: 14px 0 4px 0;
    font-size: 12px;
    flex-wrap: wrap;
  }
  .rarity-legend .rl {
    display: flex; align-items: center; gap: 6px;
    color: #ccc;
  }
  .rarity-legend .dot {
    width: 10px; height: 10px; border-radius: 50%;
    box-shadow: 0 0 6px currentColor;
  }
  .rl.common .dot { background: #94a3b8; color: #94a3b8; }
  .rl.uncommon .dot { background: #60a5fa; color: #60a5fa; }
  .rl.rare .dot { background: #c084fc; color: #c084fc; }
  .rl.legendary .dot { background: #fbbf24; color: #fbbf24; }

  .category {
    text-align: left;
    margin: 14px 0 6px 0;
    font-size: 12px;
    color: #a0a0c0;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    display: flex;
    justify-content: space-between;
  }
  .collection-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
    gap: 6px;
  }
  .emoji-cell {
    aspect-ratio: 1;
    background: rgba(255, 255, 255, 0.03);
    border: 2px solid transparent;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    filter: grayscale(100%) brightness(0.25);
    transition: all 0.3s;
    position: relative;
  }
  .emoji-cell.collected { filter: none; }
  .emoji-cell.r-common.collected   { border-color: #94a3b8; background: rgba(148, 163, 184, 0.08); }
  .emoji-cell.r-uncommon.collected { border-color: #60a5fa; background: rgba(96, 165, 250, 0.10); box-shadow: 0 0 8px rgba(96,165,250,0.4); }
  .emoji-cell.r-rare.collected     { border-color: #c084fc; background: rgba(192, 132, 252, 0.14); box-shadow: 0 0 12px rgba(192,132,252,0.55); }
  .emoji-cell.r-legendary.collected{
    border-color: #fbbf24;
    background: rgba(251, 191, 36, 0.18);
    box-shadow: 0 0 18px rgba(251,191,36,0.7);
    animation: legGlow 2s ease-in-out infinite;
  }
  /* faint border for uncollected to hint rarity */
  .emoji-cell.r-uncommon:not(.collected)  { border-color: rgba(96,165,250,0.2); }
  .emoji-cell.r-rare:not(.collected)      { border-color: rgba(192,132,252,0.25); }
  .emoji-cell.r-legendary:not(.collected) { border-color: rgba(251,191,36,0.3); }

  @keyframes legGlow {
    0%, 100% { box-shadow: 0 0 16px rgba(251,191,36,0.6); }
    50%      { box-shadow: 0 0 26px rgba(251,191,36,1); }
  }

  .emoji-cell .count {
    position: absolute;
    bottom: 1px;
    right: 3px;
    font-size: 9px;
    color: #fff;
    background: rgba(0,0,0,0.55);
    padding: 0 3px;
    border-radius: 4px;
    font-family: monospace;
  }

  button {
    background: linear-gradient(45deg, #ff6b9d, #c084fc);
    color: #fff;
    border: none;
    padding: 16px 48px;
    font-size: 20px;
    border-radius: 100px;
    cursor: pointer;
    font-weight: 700;
    box-shadow: 0 8px 28px rgba(192, 132, 252, 0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 2px;
    margin: 8px;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(192, 132, 252, 0.55); }
  button.secondary { background: rgba(255,255,255,0.08); box-shadow: none; }
  button.secondary:hover { background: rgba(255,255,255,0.14); }

  /* Game HUD */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 18px;
    margin-bottom: 8px;
    padding: 10px 18px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .hud .label { font-size: 11px; color: #a0a0c0; text-transform: uppercase; letter-spacing: 1px; display: block; }
  .hud .value { font-size: 22px; font-weight: 700; }

  #canvas-wrap { position: relative; display: inline-block; }
  #canvas {
    background: linear-gradient(180deg, #0d0d24 0%, #08081a 100%);
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(192, 132, 252, 0.25), inset 0 0 60px rgba(0,0,0,0.5);
    display: block;
    cursor: none;
    /* モバイル対応: 幅に合わせて縮小、タッチのデフォルト挙動 (スクロール/ピンチ) を抑止 */
    width: 100%;
    max-width: 640px;
    height: auto;
    aspect-ratio: 640 / 720;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #canvas-wrap {
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
  }

  /* スマホ向けの調整 */
  @media (max-width: 640px) {
    body { padding: 10px; }
    h1 { font-size: 32px; }
    .subtitle { font-size: 12px; }
    .collection-stats .big { font-size: 16px; }
    .collection-stats .pct { font-size: 24px; }
    button { padding: 12px 28px; font-size: 16px; letter-spacing: 1px; }
    #collection-panel { padding: 14px; }
    .hud { font-size: 14px; padding: 8px 12px; }
    .hud .label { font-size: 9px; letter-spacing: 0.5px; }
    .hud .value { font-size: 18px; }
    #gameover-screen { padding: 24px 16px; }
    #gameover-screen h2 { font-size: 40px; }
    .stat-row .stat { padding: 12px 18px; min-width: 90px; }
    .stat .value { font-size: 22px; }
    .ranking-header { font-size: 16px; }
    #ranking-list li { font-size: 12px; padding: 6px 8px; }
    #ranking-list .rank-stage,
    #ranking-list .rank-date { font-size: 10px; margin-left: 6px; }
    .rarity-legend { font-size: 11px; gap: 10px; }
  }

  /* Game over screen */
  #gameover-screen {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(192,132,252,0.3);
    border-radius: 20px;
    padding: 40px;
    backdrop-filter: blur(10px);
  }
  #gameover-screen h2 {
    font-size: 56px;
    margin: 0;
    background: linear-gradient(45deg, #ff6b9d, #c084fc);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .stat-row { display: flex; justify-content: space-around; margin: 24px 0; flex-wrap: wrap; gap: 16px; }
  .stat-row .stat { background: rgba(255,255,255,0.05); padding: 16px 28px; border-radius: 12px; min-width: 120px; }
  .stat .label { font-size: 11px; color: #a0a0c0; text-transform: uppercase; letter-spacing: 1px; }
  .stat .value { font-size: 28px; font-weight: 800; margin-top: 4px; }
  .new-emojis {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin: 20px 0;
    min-height: 40px;
  }

  /* ハイスコアランキング */
  #ranking-section {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(251, 191, 36, 0.25);
    border-radius: 14px;
    padding: 18px 20px;
    margin: 20px 0;
    text-align: left;
  }
  .ranking-header {
    text-align: center;
    font-size: 18px;
    font-weight: 800;
    margin: 0 0 14px 0;
    color: #fbbf24;
    letter-spacing: 2px;
  }
  #ranking-list {
    list-style: none;
    padding: 0;
    margin: 0;
    max-height: 280px;
    overflow-y: auto;
  }
  #ranking-list li {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border-radius: 8px;
    margin-bottom: 3px;
    font-size: 14px;
    background: rgba(255, 255, 255, 0.03);
    transition: background 0.2s;
  }
  #ranking-list li.current {
    background: linear-gradient(90deg, rgba(251,191,36,0.2), rgba(192,132,252,0.18));
    border: 1px solid rgba(251, 191, 36, 0.5);
    box-shadow: 0 0 14px rgba(251, 191, 36, 0.35);
    font-weight: 700;
  }
  #ranking-list .rank-num {
    color: #94a3b8;
    width: 32px;
    font-weight: 700;
    font-family: monospace;
  }
  #ranking-list li:nth-child(1) .rank-num { color: #fbbf24; }
  #ranking-list li:nth-child(2) .rank-num { color: #d4d4d8; }
  #ranking-list li:nth-child(3) .rank-num { color: #d97706; }
  #ranking-list .rank-score {
    flex: 1;
    font-weight: 700;
    color: #fff;
    font-family: monospace;
  }
  #ranking-list .rank-stage {
    color: #c084fc;
    font-size: 12px;
    margin-left: 10px;
    font-weight: 600;
  }
  #ranking-list .rank-date {
    color: #6b7280;
    font-size: 11px;
    margin-left: 10px;
    font-family: monospace;
  }
  .no-rank {
    text-align: center;
    color: #6b7280;
    padding: 16px;
    font-size: 13px;
  }
  .new-rank-banner {
    text-align: center;
    color: #fbbf24;
    font-size: 16px;
    font-weight: 800;
    margin: 8px 0 0 0;
    text-shadow: 0 0 18px rgba(251, 191, 36, 0.6);
  }
  .new-emoji {
    font-size: 32px;
    padding: 6px 10px;
    background: rgba(192,132,252,0.2);
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(192,132,252,0.5);
    animation: pop 0.5s;
    border: 2px solid #c084fc;
  }
  .new-emoji.r-legendary { background: rgba(251,191,36,0.25); box-shadow: 0 0 22px rgba(251,191,36,0.8); border-color: #fbbf24; }
  .new-emoji.r-rare { background: rgba(192,132,252,0.25); border-color: #c084fc; }
  .new-emoji.r-uncommon { background: rgba(96,165,250,0.25); border-color: #60a5fa; }
  .new-emoji.r-common { background: rgba(148,163,184,0.20); border-color: #94a3b8; }

  @keyframes pop {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .hint { font-size: 13px; color: #a0a0c0; margin: 16px 0; }

  /* お祝い画面 (Phase 完成) */
  #celebration-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(192, 132, 252, 0.25) 0%, rgba(10, 10, 26, 0.95) 60%);
    backdrop-filter: blur(8px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
    overflow-y: auto;
  }
  #celebration-screen.visible { display: flex; }
  .celebration-card {
    max-width: 600px;
    width: 100%;
    background: linear-gradient(135deg, rgba(192,132,252,0.15), rgba(96,165,250,0.12), rgba(251,191,36,0.15));
    border: 2px solid rgba(251, 191, 36, 0.5);
    border-radius: 24px;
    padding: 48px 28px;
    box-shadow: 0 0 80px rgba(251, 191, 36, 0.4), inset 0 0 40px rgba(192, 132, 252, 0.2);
    animation: celebrationPop 0.7s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes celebrationPop {
    0%   { transform: scale(0.6); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .celebration-card h2 {
    font-size: 48px;
    margin: 0 0 8px 0;
    background: linear-gradient(45deg, #fbbf24, #ff6b9d, #c084fc, #60a5fa);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shineGrad 3s ease-in-out infinite;
    text-shadow: 0 0 30px rgba(251, 191, 36, 0.5);
  }
  @keyframes shineGrad {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  .celebration-card .sub {
    font-size: 18px;
    color: #fde68a;
    margin: 8px 0 4px 0;
  }
  .celebration-card .desc {
    font-size: 14px;
    color: #d1d5db;
    margin: 16px 0 24px 0;
    line-height: 1.6;
  }
  .celebration-card .reward {
    background: rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 16px;
    margin: 16px 0;
    text-align: left;
    font-size: 13px;
    color: #cbd5e1;
  }
  .celebration-card .reward h3 {
    margin: 0 0 8px 0;
    font-size: 14px;
    color: #fbbf24;
    letter-spacing: 1px;
  }
  .celebration-card .reward ul {
    margin: 0;
    padding-left: 20px;
  }
  .celebration-card .reward li { margin: 4px 0; }
  .celebration-card .preview-emojis {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin: 16px 0;
    font-size: 32px;
  }
  .celebration-card .preview-emojis span {
    padding: 6px 10px;
    background: rgba(167, 139, 250, 0.15);
    border: 2px solid rgba(167, 139, 250, 0.5);
    border-radius: 10px;
    box-shadow: 0 0 12px rgba(167, 139, 250, 0.4);
    animation: pop 0.6s cubic-bezier(.2,.8,.2,1) backwards;
  }
  .celebration-card .preview-emojis span:nth-child(2)  { animation-delay: 0.05s; }
  .celebration-card .preview-emojis span:nth-child(3)  { animation-delay: 0.10s; }
  .celebration-card .preview-emojis span:nth-child(4)  { animation-delay: 0.15s; }
  .celebration-card .preview-emojis span:nth-child(5)  { animation-delay: 0.20s; }
  .celebration-card .preview-emojis span:nth-child(6)  { animation-delay: 0.25s; }
  .celebration-card .preview-emojis span:nth-child(7)  { animation-delay: 0.30s; }
  .celebration-card .preview-emojis span:nth-child(8)  { animation-delay: 0.35s; }

  /* シークレットコレクションUI */
  .secret-section {
    margin-top: 18px;
    padding: 14px;
    background: linear-gradient(135deg, rgba(167,139,250,0.10), rgba(251,191,36,0.06));
    border: 1px solid rgba(167, 139, 250, 0.4);
    border-radius: 12px;
  }
  .secret-section .secret-header {
    text-align: center;
    font-size: 14px;
    font-weight: 800;
    color: #a78bfa;
    margin-bottom: 8px;
    letter-spacing: 2px;
    text-shadow: 0 0 12px rgba(167, 139, 250, 0.5);
  }
  .emoji-cell.r-secret.collected {
    border-color: #a78bfa;
    background: rgba(167, 139, 250, 0.18);
    box-shadow: 0 0 14px rgba(167, 139, 250, 0.6);
  }
  .emoji-cell.r-secret:not(.collected) {
    border-color: rgba(167, 139, 250, 0.3);
  }
  .new-emoji.r-secret {
    background: rgba(167, 139, 250, 0.25);
    border-color: #a78bfa;
    box-shadow: 0 0 18px rgba(167, 139, 250, 0.7);
  }
</style>
</head>
<body>

<div id="celebration-screen">
  <div class="celebration-card">
    <h2 id="cel-title">🎊 おめでとう！🎊</h2>
    <div class="sub" id="cel-sub">ファースト・コレクション完成！</div>
    <div class="desc" id="cel-desc"></div>
    <div class="preview-emojis" id="cel-preview"></div>
    <div class="reward" id="cel-reward"></div>
    <button id="cel-close">続ける</button>
  </div>
</div>

<div id="title-screen">
  <h1>絵文字ブロック崩し</h1>
  <div class="subtitle">🌀 迷路に入ると大連鎖 ｜ レアな絵文字を集めよう</div>

  <div id="collection-panel">
    <div class="collection-stats">
      <span class="big">コレクション <span id="cs-collected">0</span> / <span id="cs-total">0</span></span>
      <span class="pct" id="cs-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="cs-bar" style="width:0%"></div></div>
    <div class="rarity-legend">
      <span class="rl common"><span class="dot"></span>コモン</span>
      <span class="rl uncommon"><span class="dot"></span>アンコモン</span>
      <span class="rl rare"><span class="dot"></span>レア</span>
      <span class="rl legendary"><span class="dot"></span>レジェンダリー</span>
    </div>
    <div id="cs-categories"></div>
  </div>

  <button id="start-btn">スタート</button>
  <button id="continue-btn" style="display:none;">続きから</button>
  <div id="save-info" style="display:none; margin: 4px 0 12px 0; font-size: 13px; color:#a0a0c0;"></div>
  <button class="secondary" id="reset-btn">コレクションをリセット</button>
  <button class="secondary" id="reset-save-btn" style="display:none;">セーブを破棄</button>
  <div class="hint">PC: 1回目クリックで発射台の位置決め → 角度を狙って2回目クリックで発射 (スペースで即発射)</div>
  <div class="hint">スマホ: 押したまま指でドラッグして発射台を動かし、離して位置確定 → 狙う方向にタップで発射</div>
</div>

<div id="game-screen">
  <div class="hud">
    <div><span class="label">ステージ</span><span class="value" id="hud-stage">1</span><span id="hud-stage-tag" style="display:none; margin-left:6px; font-size:14px;"></span></div>
    <div><span class="label">スコア</span><span class="value" id="hud-score">0</span></div>
    <div><span class="label">ライフ</span><span class="value" id="hud-lives">❤️❤️❤️</span></div>
    <div><span class="label">コンボ</span><span class="value" id="hud-combo">0</span></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="canvas" width="640" height="720"></canvas>
  </div>
</div>

<div id="gameover-screen">
  <h2 id="go-title">GAME OVER</h2>
  <div class="stat-row">
    <div class="stat"><div class="label">最終スコア</div><div class="value" id="go-score">0</div></div>
    <div class="stat"><div class="label">到達ステージ</div><div class="value" id="go-stage">1</div></div>
    <div class="stat"><div class="label">獲得シンボル</div><div class="value" id="go-newcount">0</div></div>
  </div>
  <div style="font-size:14px;color:#a0a0c0;">今回の新規収集</div>
  <div class="new-emojis" id="go-newemojis"></div>

  <div id="ranking-section">
    <div class="ranking-header">🏆 ハイスコア TOP 10</div>
    <ol id="ranking-list"></ol>
    <div class="new-rank-banner" id="go-new-rank" style="display:none;"></div>
  </div>

  <button id="go-retry">もう一度</button>
  <button class="secondary" id="go-title-btn">タイトルへ</button>
</div>

<script>
/* ============================================================
   絵文字ブロック崩し ── 迷路型 + レア度システム版
   ============================================================ */

const WEIGHT_TOTAL = EMOJI_LIST.reduce((s, x) => s + RARITY_WEIGHT[x.r], 0);
function pickWeightedEmoji() {
  let r = Math.random() * WEIGHT_TOTAL;
  for (const x of EMOJI_LIST) {
    r -= RARITY_WEIGHT[x.r];
    if (r <= 0) return x.e;
  }
  return EMOJI_LIST[0].e;
}

  return EMOJI_BY[emoji]?.r || SECRET_EMOJI_BY[emoji]?.r || 'common';

  return pool[Math.floor(Math.random() * pool.length)].e;
}

let audioCtx;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audioCtx = null; }
  }
}
function beep(freq, dur=0.05, type='square', vol=0.05) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.value = vol;
  o.connect(g); g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
  o.stop(audioCtx.currentTime + dur);
}

const COLS = 40;     // さらに細かいマスでブロック総数を増やす
const BW = 16;
const BH = 14;
const GAP = 1;

// Pattern table — 多彩な内部構造のパターン
const PATTERNS = [
  patternStadium,       // 同心リング (canonical 回遊型)
  patternHash,          // 格子状の通路 (多重ループ)
  patternFigure8,       // 8の字 (上下2ループ)
  patternDiamondTrack,  // ダイヤ型同心輪
  patternSnake,         // つづら折りの長い1本道
  patternSpiral,        // らせん (層ごとにギャップが回転)
  patternRandomMaze,    // ランダム迷路
  patternChambers       // 4部屋連結
];

// パターン抽選 — ステージごとにランダムで選択 (たまに同じ構造になる)
function pickPattern(stage) {
  // ステージ番号に基づくシードで偏りを抑えつつランダム選択
  return PATTERNS[Math.floor(Math.random() * PATTERNS.length)];
}

// タフステージ — 全ての非外周ブロックが多段HPになる
let isToughStage = false;

// HP分布抽選 — 高HPブロックの比率を増加
function pickToughHp() {
  const r = Math.random();
  if      (r < 0.30) return 2;
  else if (r < 0.50) return 3;
  else if (r < 0.65) return 4;
  else if (r < 0.78) return 5 + Math.floor(Math.random() * 2);   // 5-6
  else if (r < 0.90) return 7 + Math.floor(Math.random() * 3);   // 7-9
  else               return 10 + Math.floor(Math.random() * 6);  // 10-15
}

function pickBossType() {
  return BOSS_TYPES[Math.floor(Math.random() * BOSS_TYPES.length)];
}

// 5ステージごとにボスが登場
function isBossStageNum(s) { return s > 0 && s % 5 === 0; }

// ボスのHPスケーリング — stage 5: 100, 上限10000
function bossHpForStage(s) {
  return Math.min(10000, Math.max(100, Math.floor(100 * Math.pow(s / 5, 1.4))));
}

function generateStage() {
  bricks = [];
  bossBrick = null;
  // ブロック数増のため行数も拡大
  const rows = Math.min(28 + Math.floor((stage - 1) / 4), 36);
  const offsetX = (W - COLS * BW) / 2;
  const offsetY = 20;
  mazeBottomY = offsetY + rows * BH;  // 迷路下端の絶対Y座標

  // ステージ種別 — ボスステージはタフステージとは排他
  isBossStageNow = isBossStageNum(stage);
  isToughStage = !isBossStageNow && stage >= 3 && Math.random() < 0.25;

  // マルチボール率 — ボス: 3倍、タフ: 2倍、通常: 標準
  const multiBallProb = isBossStageNow ? 0.15 : (isToughStage ? 0.10 : 0.05);
  const emojiProb     = 0.03;
  // ライフ回復は希少 — 1ブロック当たり 0.015% (約 10ステージに1個)
  const lifeProb      = 0.00015;
  const expandProb    = 0.008;
  // シークレットアイテム — Phase 2 解放後のみ通常ステージから低確率ドロップ
  const secretProb    = phase2Active() ? 0.003 : 0;

  // パターンをランダム選択
  const pattern = pickPattern(stage);
  const mask = pattern(COLS, rows, stage);

  // ボスエリア (中央) のマスクをクリア
  let bossArea = null;
  if (isBossStageNow) {
    const cellW = 14, cellH = 9;
    const startCol = Math.floor((COLS - cellW) / 2);
    const startRow = Math.floor((rows - cellH) / 2);
    bossArea = { startCol, startRow, cellW, cellH };
    for (let r = startRow; r < startRow + cellH; r++) {
      for (let c = startCol; c < startCol + cellW; c++) {
        if (r >= 0 && r < rows && c >= 0 && c < COLS) mask[r][c] = false;
      }
    }
  }

  // Build bricks
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < COLS; col++) {
      if (!mask[row][col]) continue;
      // 外周(端の1セル)は破壊不能 — 入口で抜けたセルにはそもそもブロックを置かないので安全
      const isBorder = (row === 0 || row === rows - 1 || col === 0 || col === COLS - 1);
      let hasEmoji = false, hasMulti = false, hasLife = false, hasExpand = false, hasSecret = false;
      let emoji = null;
      if (!isBorder) {
        const roll = Math.random();
        let acc = 0;
        if (roll < (acc += emojiProb))     { hasEmoji = true; emoji = pickWeightedEmoji(); }
        else if (roll < (acc += multiBallProb)) hasMulti = true;
        else if (roll < (acc += lifeProb))      hasLife = true;
        else if (roll < (acc += expandProb))    hasExpand = true;
        else if (roll < (acc += secretProb))    { hasSecret = true; emoji = pickSecretEmoji(true); hasEmoji = true; }
      }
      // 多段HP
      let maxHp = 1;
      if (!isBorder) {
        if (isToughStage) {
          // タフステージは「すべての」非外周ブロックを硬く
          maxHp = pickToughHp();
        } else if (Math.random() < 0.06) {
          // 通常ステージでもたまに硬いブロックが混ざる
          maxHp = pickToughHp();
        }
      }
      bricks.push({
        x: offsetX + col * BW + GAP/2,
        y: offsetY + row * BH + GAP/2,
        w: BW - GAP,
        h: BH - GAP,
        cx: offsetX + col * BW + BW/2,
        cy: offsetY + row * BH + BH/2,
        col, row,
        alive: true,
        indestructible: isBorder,
        emoji,
        rarity: emoji ? rarityOf(emoji) : null,
        multiball: hasMulti,
        life: hasLife,
        expand: hasExpand,
        isSecretItem: hasSecret,
        hp: maxHp,
        maxHp: maxHp,
        itemDropped: false,
        hue: ((row * 32 + col * 12) + stage * 15) % 360
      });
    }
  }

  // ボスを生成
  if (isBossStageNow) {
    spawnBoss(bossArea, offsetX, offsetY);
  }

  // ステージ種別の通知
  if (typeof showFloater === 'function') {
    if (isBossStageNow) {
      const bn = bossBrick ? `${bossBrick.bossEmoji} ${bossBrick.bossName} ${bossBrick.bossEmoji}` : '💀 BOSS STAGE 💀';
      const bc = bossBrick ? bossBrick.themeColor : '#ef4444';
      showFloater(W/2, H/2 - 30, bn, bc, 44);
      showFloater(W/2, H/2 + 30, `HP ${bossBrick ? bossBrick.maxHp.toLocaleString() : ''} の強敵が出現！`, '#fecaca', 22);
    } else if (isToughStage) {
      showFloater(W/2, H/2 - 20, '⚒️ TOUGH STAGE', '#fbbf24', 40);
      showFloater(W/2, H/2 + 20, '全ブロックが硬化！', '#fde68a', 18);
    }
  }
}

// ── ボスの生成 ───────────────────────────────────
function spawnBoss(area, offsetX, offsetY) {
  const hp = bossHpForStage(stage);
  const x = offsetX + area.startCol * BW;
  const y = offsetY + area.startRow * BH;
  const w = area.cellW * BW - 4;
  const h = area.cellH * BH - 4;

  // HPに応じた視覚ティア
  let visTier = 1;
  if (hp >= 7500) visTier = 5;
  else if (hp >= 2500) visTier = 4;
  else if (hp >= 800)  visTier = 3;
  else if (hp >= 300)  visTier = 2;

  // 絵文字ベースのボスタイプを抽選
  const type = pickBossType();

  bossBrick = {
    isBoss: true,
    x: x + 2, y: y + 2,
    w, h,
    cx: x + 2 + w/2,
    cy: y + 2 + h/2,
    col: area.startCol, row: area.startRow,
    alive: true,
    indestructible: false,
    hp, maxHp: hp,
    visTier,
    bossEmoji: type.e,
    bossName: type.name,
    themeColor: type.col,
    auraHue: type.auraHue,
    pattern: type.pattern,
    spikes: visTier >= 3 || type.pattern === 'spikes',
    aura:   visTier >= 2,
    fire:   visTier >= 4 || type.pattern === 'fire',
    tentacles: type.pattern === 'tentacle',
    techRings: type.pattern === 'tech',
    rainbow: visTier === 5,
    itemDropped: false,
    hitFlash: 0,
    milestonesHit: 0,
    hue: 0
  };
  bricks.push(bossBrick);
}

// ── Patterns (2セル幅の通路を持つ回遊型迷路) ────
// 設計: ほぼ全マスをブロックで埋め、2セル幅のループ通路を彫る。
// ボールが入口から進入すると通路に沿って壁を破壊しながら回遊し、
// 通路がほどけて出てくるまで長く滞留する。
function fillAll(c, r) { return Array.from({length: r}, () => Array(c).fill(true)); }

// 横通路 — 2セル幅 (rows i, i+1)
function carveLineH(m, i, x1, x2) {
  for (let dy = 0; dy < 2; dy++) {
    const ri = i + dy;
    if (ri < 0 || ri >= m.length) continue;
    for (let j = Math.max(0, x1); j <= Math.min(m[0].length - 1, x2); j++) m[ri][j] = false;
  }
}
// 縦通路 — 2セル幅 (cols j, j+1)
function carveLineV(m, j, y1, y2) {
  for (let dx = 0; dx < 2; dx++) {
    const cj = j + dx;
    if (cj < 0 || cj >= m[0].length) continue;
    for (let i = Math.max(0, y1); i <= Math.min(m.length - 1, y2); i++) m[i][cj] = false;
  }
}
// 矩形リング — 2セル幅の帯
function carveRing(m, c, r, margin) {
  for (let dy = 0; dy < 2; dy++) {
    const top = margin + dy;
    const bot = r - 1 - margin - dy;
    for (let j = margin; j < c - margin; j++) {
      if (top >= 0 && top < r) m[top][j] = false;
      if (bot >= 0 && bot < r) m[bot][j] = false;
    }
  }
  for (let dx = 0; dx < 2; dx++) {
    const left  = margin + dx;
    const right = c - 1 - margin - dx;
    for (let i = margin; i < r - margin; i++) {
      if (left >= 0 && left < c)  m[i][left]  = false;
      if (right >= 0 && right < c) m[i][right] = false;
    }
  }
}
// 入口 — ランダムな位置から2セル幅で上に彫り、最初に当たる通路まで届かせる
function carveEntranceFromBottom(m, c, r) {
  // 不滅の左右壁を避けて、cols [3 .. c-5] のランダムな位置から開ける
  const range = Math.max(1, c - 8);
  const cCol = 3 + Math.floor(Math.random() * range);
  for (let i = r - 1; i >= 0; i--) {
    if (m[i][cCol] === false && m[i][cCol + 1] === false) break;
    m[i][cCol] = false;
    if (cCol + 1 < c) m[i][cCol + 1] = false;
  }
}

// 1. スタジアム — 同心2-wideリング + 上中央で連絡 (canonical 回遊型)
function patternStadium(c, r) {
  const m = fillAll(c, r);
  carveRing(m, c, r, 3);   // 外環 (rows 3-4 / r-5,r-4 など)
  carveRing(m, c, r, 8);   // 内環 (rows 8-9 / r-10,r-9 など — 壁3セル厚)
  const cCol = Math.floor(c / 2) - 1;
  // 上中央で外環→内環を連絡 (2-wide vertical)
  carveLineV(m, cCol, 3, 9);
  carveEntranceFromBottom(m, c, r);
  return m;
}

// 2. ハッシュ格子 — 縦横の2-wide通路で多数のループ
function patternHash(c, r) {
  const m = fillAll(c, r);
  carveRing(m, c, r, 2);                                            // 外環 (margin 2)
  for (let i = 7; i < r - 4; i += 5) carveLineH(m, i, 2, c - 3);   // 横通路 (5行ステップで壁3厚)
  for (let j = 8; j < c - 4; j += 6) carveLineV(m, j, 2, r - 3);   // 縦通路 (6列ステップで壁4厚)
  carveEntranceFromBottom(m, c, r);
  return m;
}

// 3. 8の字 — 上下に積まれた2-wideループが中央で連絡
function patternFigure8(c, r) {
  const m = fillAll(c, r);
  const midRow = Math.floor(r / 2) - 1;
  // 上のループ
  carveLineH(m, 3, 3, c - 5);
  carveLineH(m, midRow, 3, c - 5);
  carveLineV(m, 3, 3, midRow + 1);
  carveLineV(m, c - 5, 3, midRow + 1);
  // 下のループ
  carveLineH(m, r - 5, 3, c - 5);
  carveLineV(m, 3, midRow, r - 4);
  carveLineV(m, c - 5, midRow, r - 4);
  carveEntranceFromBottom(m, c, r);
  return m;
}

// 4. ダイヤトラック — 同心ダイヤの2-wide輪 (連続するマンハッタン距離2つ分)
function patternDiamondTrack(c, r) {
  const m = fillAll(c, r);
  const cy = Math.floor(r / 2);
  const cx = Math.floor(c / 2);
  const outerR = Math.min(cy, cx) - 1;
  const midR   = Math.max(4, Math.floor(outerR * 0.66));
  const innerR = Math.max(2, Math.floor(outerR * 0.33));
  for (let i = 0; i < r; i++) {
    for (let j = 0; j < c; j++) {
      const d = Math.abs(i - cy) + Math.abs(j - cx);
      // 連続する2つのd値で2-wide風の輪に
      if (d === outerR || d === outerR - 1) m[i][j] = false;
      if (d === midR   || d === midR   - 1) m[i][j] = false;
      if (d === innerR || d === innerR - 1) m[i][j] = false;
    }
  }
  // 内外を繋ぐ2-wide連絡通路
  carveLineV(m, cx - 1, cy - outerR, cy - innerR);
  carveLineV(m, cx - 1, cy + innerR, cy + outerR);
  carveEntranceFromBottom(m, c, r);
  return m;
}

// 5. スネーク — 2-wideのつづら折り長通路
function patternSnake(c, r) {
  const m = fillAll(c, r);
  let row = 3;
  let dir = 1;
  while (row < r - 4) {
    carveLineH(m, row, 3, c - 5);
    const nextRow = row + 5;             // 5行ステップ (2-wide通路 + 3-wide壁)
    if (nextRow < r - 3) {
      const turnCol = (dir > 0) ? c - 5 : 3;
      carveLineV(m, turnCol, row, nextRow + 1);
    }
    row = nextRow;
    dir = -dir;
  }
  carveEntranceFromBottom(m, c, r);
  return m;
}

// 6. らせん — 同心リングを彫りつつ層ごとにギャップ位置を回転させ、
// 内側に向かってボールが渦を描いて進む
function patternSpiral(c, r) {
  const m = fillAll(c, r);
  let margin = 3;
  let layer = 0;
  while (margin * 2 + 6 <= Math.min(c, r)) {
    carveRing(m, c, r, margin);
    // 各層のギャップ位置を90°ずつ回転させて、層から層へ螺旋状に繋ぐ
    const cCol = Math.floor(c / 2) - 1;
    const cRow = Math.floor(r / 2) - 1;
    const side = layer % 4;
    if (side === 0) {
      // 下中央のギャップ (外環→次の内環)
      carveLineV(m, cCol, r - 1 - margin - 4, r - 1 - margin);
    } else if (side === 1) {
      carveLineH(m, cRow, margin, margin + 4);
    } else if (side === 2) {
      carveLineV(m, cCol, margin, margin + 4);
    } else {
      carveLineH(m, cRow, c - 1 - margin - 4, c - 1 - margin);
    }
    margin += 4;
    layer++;
  }
  carveEntranceFromBottom(m, c, r);
  return m;
}

// 7. ランダム迷路 — 縦横の通路をランダム位置に配置し、毎回異なる迷路を生成
function patternRandomMaze(c, r) {
  const m = fillAll(c, r);
  // 外環で全体の連結性確保
  carveRing(m, c, r, 2);
  // ランダムな横通路 4-6本
  const numH = 4 + Math.floor(Math.random() * 3);
  for (let n = 0; n < numH; n++) {
    const row = 5 + Math.floor(Math.random() * Math.max(1, r - 11));
    carveLineH(m, row, 2, c - 3);
  }
  // ランダムな縦通路 4-6本
  const numV = 4 + Math.floor(Math.random() * 3);
  for (let n = 0; n < numV; n++) {
    const col = 5 + Math.floor(Math.random() * Math.max(1, c - 11));
    carveLineV(m, col, 2, r - 3);
  }
  carveEntranceFromBottom(m, c, r);
  return m;
}

// 8. 4部屋連結 — 4つの長方形チャンバーが中央の十字路で繋がる
function patternChambers(c, r) {
  const m = fillAll(c, r);
  const midX = Math.floor(c / 2);
  const midY = Math.floor(r / 2);
  // 各部屋の輪郭(2-wideリング)を彫る
  // 左上
  carveRing2Inside(m, c, r, 3, 3, midX - 3, midY - 3);
  // 右上
  carveRing2Inside(m, c, r, midX + 1, 3, c - 4, midY - 3);
  // 左下
  carveRing2Inside(m, c, r, 3, midY + 1, midX - 3, r - 4);
  // 右下
  carveRing2Inside(m, c, r, midX + 1, midY + 1, c - 4, r - 4);
  // 中央の十字通路で4部屋を連結
  carveLineV(m, midX - 1, 3, r - 3);
  carveLineH(m, midY - 1, 3, c - 3);
  carveEntranceFromBottom(m, c, r);
  return m;
}

// 任意矩形の2-wide輪郭を彫るヘルパー
function carveRing2Inside(m, c, r, x1, y1, x2, y2) {
  if (x2 - x1 < 4 || y2 - y1 < 4) return;
  // 上下バンド
  for (let dy = 0; dy < 2; dy++) {
    for (let j = x1; j <= x2; j++) {
      if (y1 + dy >= 0 && y1 + dy < r) m[y1 + dy][j] = false;
      if (y2 - dy >= 0 && y2 - dy < r) m[y2 - dy][j] = false;
    }
  }
  // 左右バンド
  for (let dx = 0; dx < 2; dx++) {
    for (let i = y1; i <= y2; i++) {
      if (x1 + dx >= 0 && x1 + dx < c) m[i][x1 + dx] = false;
      if (x2 - dx >= 0 && x2 - dx < c) m[i][x2 - dx] = false;
    }
  }
}

// ── セーブデータ (途中から再開) ────────────────
const SAVE_KEY = 'emojiBreakoutSave_v1';

function loadSavedGame() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)); }
  catch (e) { return null; }
}
function saveGameState() {
  if (gameState !== 'playing' || lives <= 0) return;
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      stage, score, lives,
      comboBest: comboBest || 0,
      sessionNew: [...(sessionNew || [])],
      savedAt: Date.now()
    }));
  } catch (e) {}
}
function clearSavedGame() {
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
}

// ── Game lifecycle ───────────────────────────────
function startGame(continueFromSave) {
  ensureAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

  let resumed = false;
  if (continueFromSave) {
    const save = loadSavedGame();
    if (save) {
      lives = save.lives;
      score = save.score;
      stage = save.stage;
      comboBest = save.comboBest || 0;
      sessionNew = new Set(save.sessionNew || []);
      resumed = true;
    }
  }
  if (!resumed) {
    lives = 3; score = 0; stage = 1;
    comboBest = 0;
    sessionNew = new Set();
  }
  comboCount = 0; comboTimer = 0; screenShake = 0;
  drops = []; particles = []; floaters = [];
  stageClearing = false;
  levelTransitionTimer = 0;
  paddleExpandUntil = 0;
  generateStage();
  resetBall();
  paddle.w = paddle.baseW;
  gameState = 'playing';
  saveGameState();  // 開始 (or 再開) 時点でセーブ
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('gameover-screen').style.display = 'none';
  loop();
}

function resetBall() {
  balls = [{
    x: paddle.x + paddle.w/2,
    y: paddle.y - 10,
    dx: 0, dy: 0, r: 8,
    onPaddle: true,
    trail: []
  }];
  // 新しいボールが乗ったので、発射フェーズはまずA(位置決め)から
  aimingMode = false;
}

function loseLife() {
  lives--;
  playLose();
  screenShake = 12;
  if (lives <= 0) { gameOver(); return; }
  resetBall();
  saveGameState();   // ライフ減少時点でセーブ更新
}

function gameOver() {
  gameState = 'gameover';
  clearSavedGame();   // ゲームオーバー時はセーブを破棄
  document.getElementById('go-title').textContent = 'GAME OVER';
  showGameOverScreen();
}

function stageClear() {
  if (stageClearing) return;   // 既にクリア演出中なら無視 (二重発火防止)
  stageClearing = true;
  playClear();
  score += 200 * stage;
  stage++;
  comboCount = 0;
  showFloater(W/2, H/2 - 60, '✨ STAGE CLEAR ✨', '#ffd700', 56);
  showFloater(W/2, H/2 + 10, '次のステージへ →', '#ffffff', 22);
  levelTransitionTimer = 90;
  saveGameState();   // ステージクリア時点 (新ステージ番号) で即セーブ
  setTimeout(() => {
    if (gameState !== 'playing') {
      stageClearing = false;
      return;
    }
    generateStage();
    resetBall();
    levelTransitionTimer = 0;
    stageClearing = false;
    saveGameState();
  }, 1500);
}

// ── ハイスコアランキング ────────────────────────
const RANK_KEY = 'emojiBreakoutRanking_v1';
const MAX_RANK = 10;

function loadRanking() {
  try { return JSON.parse(localStorage.getItem(RANK_KEY)) || []; }
  catch (e) { return []; }
}
function saveRanking(scores) {
  try { localStorage.setItem(RANK_KEY, JSON.stringify(scores)); } catch (e) {}
}
function addToRanking(scoreVal, stageVal) {
  const id = Date.now() + '_' + Math.random().toString(36).slice(2, 7);
  const entry = { score: scoreVal, stage: stageVal, date: new Date().toISOString(), id };
  const scores = loadRanking();
  scores.push(entry);
  scores.sort((a, b) => b.score - a.score);
  const top = scores.slice(0, MAX_RANK);
  saveRanking(top);
  const rank = top.findIndex(e => e.id === id);  // 0-indexed, -1 if not in top
  return { top, rank };
}

function showGameOverScreen() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('gameover-screen').style.display = 'block';
  document.getElementById('go-score').textContent = score.toLocaleString();
  document.getElementById('go-stage').textContent = stage;
  document.getElementById('go-newcount').textContent = sessionNew.size;
  const newWrap = document.getElementById('go-newemojis');
  newWrap.innerHTML = '';
  if (sessionNew.size === 0) {
    newWrap.innerHTML = '<div style="color:#777;">新しいシンボルなし…またチャレンジ！</div>';
  } else {
    const order = ['legendary','rare','uncommon','common'];
    const arr = [...sessionNew].sort((a, b) => order.indexOf(rarityOf(a)) - order.indexOf(rarityOf(b)));
    arr.forEach(e => {
      const el = document.createElement('div');
      const isSec = isSecretEmoji(e);
      el.className = 'new-emoji r-' + rarityOf(e) + (isSec ? ' r-secret' : '');
      el.textContent = e;
      el.title = (isSec ? '🌌 シークレット ' : '') + RARITY_LABEL_JP[rarityOf(e)];
      newWrap.appendChild(el);
    });
  }

  // ランキング更新と描画
  const { top, rank } = addToRanking(score, stage);
  const rankList = document.getElementById('ranking-list');
  rankList.innerHTML = '';
  if (top.length === 0) {
    rankList.innerHTML = '<li class="no-rank">まだ記録がありません</li>';
  } else {
    top.forEach((entry, idx) => {
      const li = document.createElement('li');
      if (idx === rank) li.classList.add('current');
      const d = new Date(entry.date);
      const dateStr = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
      const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `${idx + 1}.`;
      li.innerHTML =
        `<span class="rank-num">${medal}</span>` +
        `<span class="rank-score">${entry.score.toLocaleString()}</span>` +
        `<span class="rank-stage">St.${entry.stage}</span>` +
        `<span class="rank-date">${dateStr}</span>`;
      rankList.appendChild(li);
    });
  }

  // ランクインバナー
  const banner = document.getElementById('go-new-rank');
  if (rank >= 0) {
    banner.style.display = 'block';
    banner.textContent = `✨ ランクイン！ #${rank + 1} ✨`;
  } else {
    banner.style.display = 'none';
  }

  // お祝い画面 (Phase完成) を上に重ねて表示
  maybeShowCelebration();
}

function backToTitle() {
  gameState = 'title';
  document.getElementById('gameover-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('title-screen').style.display = 'block';
  renderCollection();
  refreshContinueButton();
